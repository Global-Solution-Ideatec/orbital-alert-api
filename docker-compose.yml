version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: orbital-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbitaldb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  orbital-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbital-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=orbitaldb;Username=postgres;Password=postgres

volumes:
  postgres_data: